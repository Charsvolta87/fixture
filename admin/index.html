<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Generator Panel</title>

  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="admin-panel">

    <h1>WORLD CUP DATA GENERATOR</h1>

    <div class="form-grid">

      <input type="text" id="group" placeholder="Grupo">

      <input type="text" id="home" placeholder="Equipo local">

      <input type="text" id="away" placeholder="Equipo visitante">

      <input type="number" id="homeScore" placeholder="Goles local">

      <input type="number" id="awayScore" placeholder="Goles visitante">

      <input type="text" id="stadium" placeholder="Estadio">

      <input type="date" id="date">

      <input type="time" id="time">

      <select id="status">
        <option value="finished">Finalizado</option>
        <option value="upcoming">Próximo</option>
      </select>

    </div>

    <button onclick="addMatch()">
      AGREGAR PARTIDO
    </button>

    <button onclick="downloadJS()">
      DESCARGAR groups.js
    </button>

    <pre id="preview"></pre>

  </div>

  <script src="generator.js"></script>

</body>
</html>
